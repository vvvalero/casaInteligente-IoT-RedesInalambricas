# docker-compose.yml — Casa Inteligente IoT con Fiware
#
# Servicios desplegados:
#   - orion        : Context Broker NGSI-v2 (puerto 1026)
#   - mongo-db     : Base de datos para Orion e IoT Agent (puerto 27017)
#   - iot-agent    : IoT Agent UltraLight 2.0 (puerto 4041)
#   - mosquitto    : Broker MQTT (puertos 1883 y 9001)
#
# Uso:
#   Arrancar:  ./services start
#   Parar:     ./services stop

version: "3.8"

services:

  # -------------------------------------------------------
  # Orion Context Broker
  # -------------------------------------------------------
  orion:
    image: fiware/orion:3.10.1
    hostname: orion
    container_name: smarthome-orion
    depends_on:
      mongo-db:
        condition: service_healthy
    networks:
      - smarthome-net
    ports:
      - "1026:1026"
    command: -dbhost mongo-db -logLevel WARN -noCache
    healthcheck:
      test: curl --fail -s http://orion:1026/version || exit 1
      interval: 10s
      retries: 5
    restart: unless-stopped

  # -------------------------------------------------------
  # MongoDB
  # -------------------------------------------------------
  mongo-db:
    image: mongo:6.0
    hostname: mongo-db
    container_name: smarthome-mongodb
    networks:
      - smarthome-net
    ports:
      - "27017:27017"
    volumes:
      - mongo-db-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      retries: 5
    restart: unless-stopped

  # -------------------------------------------------------
  # IoT Agent UltraLight 2.0
  # -------------------------------------------------------
  iot-agent:
    image: quay.io/fiware/iotagent-ul:latest
    hostname: iot-agent
    container_name: smarthome-iot-agent
    depends_on:
      orion:
        condition: service_healthy
      mongo-db:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - smarthome-net
    ports:
      - "4041:4041"
    environment:
      - IOTA_CB_HOST=orion
      - IOTA_CB_PORT=1026
      - IOTA_NORTH_PORT=4041
      - IOTA_REGISTRY_TYPE=mongodb
      - IOTA_LOG_LEVEL=WARN
      - IOTA_TIMESTAMP=true
      - IOTA_CB_NGSI_VERSION=v2
      - IOTA_AUTOCAST=true
      - IOTA_MONGO_HOST=mongo-db
      - IOTA_MONGO_PORT=27017
      - IOTA_MONGO_DB=iotagentul
      - IOTA_MQTT_HOST=mosquitto
      - IOTA_MQTT_PORT=1883
      - IOTA_DEFAULT_RESOURCE=
      - IOTA_PROVIDER_URL=http://iot-agent:4041
      - IOTA_DEFAULT_TRANSPORT=MQTT
      - IOTA_MULTI_CORE=true
      - IOTA_AMQP_DISABLE=true
    healthcheck:
      test: curl --fail -s http://iot-agent:4041/iot/about || exit 1
      interval: 10s
      retries: 5
    restart: unless-stopped

  # -------------------------------------------------------
  # Mosquitto MQTT Broker
  # -------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2.0
    hostname: mosquitto
    container_name: smarthome-mosquitto
    networks:
      - smarthome-net
    ports:
      - "1883:1883"    # MQTT estándar
      - "9001:9001"    # WebSockets
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped


networks:
  smarthome-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.1.0/24

volumes:
  mongo-db-data: {}
