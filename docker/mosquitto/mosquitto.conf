# mosquitto.conf — Configuración del broker MQTT para la casa inteligente

# Escuchar en el puerto MQTT estándar (sin autenticación para desarrollo)
listener 1883
allow_anonymous true

# WebSockets (para clientes web o Node-RED)
listener 9001
protocol websockets
allow_anonymous true

# Logging
log_type error
log_type warning
log_type information
log_dest stdout

# Persistencia de mensajes
persistence true
persistence_location /mosquitto/data/
